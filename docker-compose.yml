services:
  surrealdb:
    image: surrealdb/surrealdb:v3.0.5
    container_name: surriti-surrealdb
    # Run as root so the named volume mounted at /data is writable on a
    # fresh deploy (the upstream image's default user can't create files
    # in an empty bind/named-volume mount).
    user: "root"
    # `rocksdb` is the on-disk engine. Data lives under /data inside the
    # container (mapped to the named volume below) so `docker compose down`
    # no longer wipes the graph. To do a full reset (DB + container):
    # `docker compose down -v`.
    command: start --user root --pass root --bind 0.0.0.0:8000 rocksdb:/data/surreal.db
    ports:
      - "18004:8000"
    volumes:
      - surrealdb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--endpoint", "http://localhost:8000"]
      interval: 2s
      timeout: 2s
      retries: 30

  myapp:
    build:
      context: .          # repo root -- so both myapp/ and surriti/ are available
      dockerfile: myapp/Dockerfile
    container_name: surriti-myapp
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      VLLM_BASE_URL: "http://192.168.122.1:7100/v1"
      EMBED_BASE_URL: "http://192.168.122.1:7100/v1"
      VLLM_MODEL:    "RedHatAI/Qwen3.6-35B-A3B-NVFP4"
      EMBED_MODEL:   "nomic-ai/nomic-embed-text-v1.5"
      EMBED_DIM:     "768"
      SURRITI_SURREAL_URL:  "ws://surrealdb:8000/rpc"
      SURRITI_SURREAL_NS:   "myapp"
      SURRITI_SURREAL_DB:   "myapp"
      # WARNING: root/root are dev/local defaults — override in production.
      SURRITI_SURREAL_USER: "root"
      SURRITI_SURREAL_PASS: "root"
    depends_on:
      surrealdb:
        condition: service_healthy
    restart: unless-stopped

  visualizer:
    build:
      context: .
      dockerfile: visualizer/Dockerfile
    container_name: visualizer
    ports:
      - "18005:8000"
    environment:
      - SURRITI_SURREAL_URL=ws://surrealdb:8000/rpc
      - SURRITI_SURREAL_NS=${SURRITI_SURREAL_NS:-myapp}
      - SURRITI_SURREAL_DB=${SURRITI_SURREAL_DB:-myapp}
      - SURRITI_SURREAL_USER=${SURRITI_SURREAL_USER:-root}
      - SURRITI_SURREAL_PASS=${SURRITI_SURREAL_PASS:-root}
    depends_on:
      surrealdb:
        condition: service_started
    restart: unless-stopped


volumes:
  # Holds the SurrealDB on-disk store. Survives `docker compose down`;
  # nuke with `docker compose down -v` for a full reset.
  surrealdb_data:
